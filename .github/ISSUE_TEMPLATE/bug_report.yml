name: Bug report
description: Report a reproducible, non-sensitive defect
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Never include recovery words, private keys, passwords, pairing URLs, tokens or personal financial data. Security reports belong in private vulnerability reporting."
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Redacted reproduction steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      placeholder: "ChatGPT Android, Windows, browser, MCP Inspector..."
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety confirmation
      options:
        - label: I removed all secrets, recovery material, pairing URLs and personal data.
          required: true
